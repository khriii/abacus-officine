<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abacus</title>
    <script src="../js/admin_page.js"></script>
    <link rel="stylesheet" href="../style/main.css">
</head>

<body>
    <h1>Benvenuto Admin!</h1>

    <div>
        <h3>Aggiungi servizi</h3>
        <input type="text" id="descrizioneServizio" placeholder="Descrizione">
        <input type="text" id="costo_orarioServizio" placeholder="Costo orario">
        <button id="addServizioButton">Aggiungi servizio</button>
    </div>

    <div>
        <h3>Aggiungi accessori</h3>
        <input type="text" id="descrizioneAccessorio" placeholder="Descrizione">
        <input type="text" id="costo_unitarioAccessorio" placeholder="Costo unitario">
        <button id="addAccessorioButton">Aggiungi accessorio</button>
    </div>

    <button id="loginButton">Login</button>
    <button id="logoutButton">Logout</button>

</body>

</html>
